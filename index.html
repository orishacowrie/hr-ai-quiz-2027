<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Maturity Test for HR</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --border: #2e2e2e;
    --text: #f0f0f0; --muted: #888; --accent: #c8f04d;
    --correct: #4ddbaf; --correct-dim: rgba(77,219,175,0.12);
    --wrong: #ff6b6b; --wrong-dim: rgba(255,107,107,0.12); --radius: 10px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 2rem 1rem 4rem; }
  .container { width: 100%; max-width: 600px; }
  .header { margin-bottom: 2.5rem; padding-top: 1rem; }
  .header-tag { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 10px; }
  h1 { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 600; line-height: 1.2; color: var(--text); margin-bottom: 8px; }
  .header-sub { font-size: 14px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .progress-wrap { margin-bottom: 2rem; }
  .progress-meta { display: flex; justify-content: space-between; font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 2px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 99px; transition: width 0.4s ease; }
  .q-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
  .q-label { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 0.1em; margin-bottom: 12px; }
  .q-text { font-size: 16px; font-weight: 500; line-height: 1.5; color: var(--text); margin-bottom: 1.25rem; }
  .opts { display: flex; flex-direction: column; gap: 8px; }
  .opt { display: flex; align-items: flex-start; gap: 12px; padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; font-size: 14px; color: var(--text); background: var(--surface2); transition: border-color 0.15s, background 0.15s; line-height: 1.4; text-align: left; }
  .opt:hover { border-color: #444; background: #2a2a2a; }
  .opt-key { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); min-width: 16px; margin-top: 1px; flex-shrink: 0; }
  .opt.sel-correct { border-color: var(--correct); background: var(--correct-dim); }
  .opt.sel-correct .opt-key { color: var(--correct); }
  .opt.sel-wrong { border-color: var(--wrong); background: var(--wrong-dim); }
  .opt.sel-wrong .opt-key { color: var(--wrong); }
  .hint-box { margin-top: 12px; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-family: 'DM Mono', monospace; line-height: 1.6; display: none; }
  .hint-box.correct { background: var(--correct-dim); color: var(--correct); border: 1px solid rgba(77,219,175,0.25); }
  .hint-box.wrong { background: var(--wrong-dim); color: var(--wrong); border: 1px solid rgba(255,107,107,0.25); }
  .next-btn { width: 100%; padding: 13px; border-radius: var(--radius); border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; margin-top: 1rem; display: none; transition: background 0.15s, color 0.15s; }
  .next-btn:hover { background: var(--accent); color: var(--bg); }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem 1.5rem; text-align: center; }
  .result-emoji { font-size: 52px; margin-bottom: 1rem; line-height: 1; }
  .result-title { font-size: 26px; font-weight: 600; color: var(--text); margin-bottom: 6px; }
  .result-score { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); margin-bottom: 1rem; }
  .result-desc { font-size: 14px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.7; max-width: 440px; margin: 0 auto 1.5rem; }
  .result-steps { border-top: 1px solid var(--border); padding-top: 1.5rem; display: flex; flex-direction: column; gap: 12px; text-align: left; }
  .result-step { display: flex; gap: 12px; align-items: flex-start; }
  .step-num { color: var(--accent); min-width: 18px; font-size: 13px; font-family: 'DM Mono', monospace; flex-shrink: 0; }
  .step-text { color: var(--text); font-size: 13px; font-family: 'DM Mono', monospace; line-height: 1.5; }
  .result-smile { display: flex; gap: 12px; align-items: flex-start; border-top: 1px solid var(--border); padding-top: 12px; margin-top: 4px; }
  .btn-row { display: flex; gap: 10px; margin-top: 1.5rem; justify-content: center; flex-wrap: wrap; }
  .btn-ghost { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
  .btn-ghost:hover { border-color: #555; color: var(--text); }
  .btn-accent { padding: 10px 22px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: 'DM Mono', monospace; font-size: 12px; cursor: pointer; }
  .btn-accent:hover { background: var(--accent); color: var(--bg); }
  @media (max-width: 480px) { .q-card { padding: 1.25rem; } h1 { font-size: 1.5rem; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-tag">🧠 AI Maturity Test for HR</div>
    <h1>What's your AI level?</h1>
    <div class="header-sub">Answer honestly. The AI already knows.</div>
  </div>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">Question 1 of 10</span>
      <span id="score-label"></span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progress" style="width:10%"></div></div>
  </div>
  <div id="q-container"></div>
</div>
<script>
const questions = [
  { text: "Have you heard about the RCJF rule?", opts: ["Yes, I use it", "I've heard it but not sure what it is", "Sounds familiar from LinkedIn", "Is this HR compliance?"], scores: [3,2,1,0], hint: "Role, Context, Job, Format — the backbone of any prompt that actually works." },
  { text: "Have you configured custom instructions in your AI?", opts: ["Yes, multiple setups", "Yes, once", "I think so", "I just type \"improve this\""], scores: [3,2,1,0], hint: "Your name, role, tone, output format — saves 3 sentences in every single prompt." },
  { text: "Do you have a paid AI subscription?", opts: ["Yes, more than one", "Yes", "Planning to", "Free version works… mostly"], scores: [3,2,1,0], hint: "The free tier runs out exactly when you need it most. Usually mid-offer letter." },
  { text: "Context window is:", opts: ["Model memory limit", "Chat history", "Something technical", "The chat box"], scores: [3,2,1,0], hint: "200k tokens ≈ 150,000 words. After that, the AI forgets everything." },
  { text: "Do you have GitHub?", opts: ["Yes, with something inside", "Yes, empty", "Registered once", "That's for developers"], scores: [3,2,1,0], hint: "Even if you don't write code — great for storing scripts and pretending you're an engineer." },
  { text: "Railway / Vercel / Render — you:", opts: ["Host things there", "Watched tutorials", "Know the names", "Sounds like logistics"], scores: [3,2,1,0], hint: "That's where you put things you built with AI. Without this, your bot lives only on your laptop." },
  { text: "Have you installed Cursor / AI IDE?", opts: ["Yes, using it", "Installed, scared", "Planning to", "I'm HR, why would I"], scores: [3,2,1,0], hint: "Cursor is VS Code with AI built in. You open it and immediately feel like a developer." },
  { text: "Have you built anything with AI?", opts: ["Bot / assistant", "Automation", "Prompt library", "Just experiments"], scores: [3,2,1,0], hint: "Your first bot that sends a notification — you remember it forever." },
  { text: "Your monthly AI spending looks like:", opts: ["Several subscriptions, I stopped counting", "ChatGPT + one more tool", "Just one paid tool", "Free plan + motivation"], scores: [3,2,1,0], hint: "Motivation is great. It doesn't have access to GPT-4." },
  { text: "API key — this is:", opts: ["Something I already used", "I've seen it in tutorials", "Sounds technical but important", "No idea"], scores: [3,2,1,0], hint: "A password that connects your code to an AI model. Step one of everything." }
];

const levels = [
  { min:0, max:7, emoji:"🪨", title:"Stone Age HR", desc:"You use AI like Google. Still copy-paste everything. Occasionally say \"AI is overrated.\" Uses AI to translate emails. That's it." },
  { min:8, max:14, emoji:"☕", title:"Saved for Later HR", desc:"You read AI posts. You save everything. You will definitely try it. Soon. Probably. The folder is called \"AI stuff\"." },
  { min:15, max:20, emoji:"🧩", title:"Prompt Collector HR", desc:"You have prompts. You tweak prompts. You sometimes scare colleagues with words like \"context\". One webhook away from the next level." },
  { min:21, max:26, emoji:"🤖", title:"Accidental Automation HR", desc:"You built something once. It worked. Now everyone thinks you're the AI person. You've stopped correcting them." },
  { min:27, max:30, emoji:"🚀", title:"HR Engineer", desc:"Go build a startup. HR is just one of your modules now." }
];

let current = 0, score = 0, answered = new Array(10).fill(null);
function getLevel(s) { return levels.find(l => s >= l.min && s <= l.max); }

function render() {
  if (current >= questions.length) { showResult(); return; }
  const q = questions[current];
  document.getElementById('progress').style.width = Math.max((current / questions.length * 100), 10) + '%';
  document.getElementById('prog-label').textContent = `Question ${current + 1} of ${questions.length}`;
  document.getElementById('score-label').textContent = score > 0 ? score + ' pts' : '';
  const keys = ['A','B','C','D'];
  const optsHtml = q.opts.map((o,i) => `<div class="opt" onclick="choose(${i})" id="opt-${i}"><span class="opt-key">${keys[i]}</span><span>${o}</span></div>`).join('');
  document.getElementById('q-container').innerHTML = `
    <div class="q-card">
      <div class="q-label">QUESTION ${current + 1}</div>
      <div class="q-text">${q.text}</div>
      <div class="opts">${optsHtml}</div>
      <div class="hint-box" id="hint"></div>
    </div>
    <button class="next-btn" id="next-btn" onclick="next()">${current === questions.length - 1 ? 'See my result →' : 'Next →'}</button>`;
}

function choose(idx) {
  if (answered[current] !== null) return;
  const q = questions[current];
  const pts = q.scores[idx];
  const best = Math.max(...q.scores);
  const isCorrect = pts === best;
  score += pts;
  answered[current] = idx;
  document.getElementById('opt-' + idx).className = 'opt ' + (isCorrect ? 'sel-correct' : 'sel-wrong');
  if (!isCorrect) document.getElementById('opt-' + q.scores.indexOf(best)).className = 'opt sel-correct';
  const hint = document.getElementById('hint');
  hint.textContent = q.hint;
  hint.className = 'hint-box ' + (isCorrect ? 'correct' : 'wrong');
  hint.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
  document.getElementById('score-label').textContent = score + ' pts';
}

function next() { current++; render(); }

function showResult() {
  document.getElementById('progress').style.width = '100%';
  document.getElementById('prog-label').textContent = 'Done!';
  document.getElementById('score-label').textContent = score + ' / 30';
  const lv = getLevel(score);
  const titleEsc = lv.title.replace(/'/g, "\\'");
  document.getElementById('q-container').innerHTML = `
    <div class="result-card">
      <div class="result-emoji">${lv.emoji}</div>
      <div class="result-title">${lv.title}</div>
      <div class="result-score">${score} / 30 pts</div>
      <div class="result-desc">${lv.desc}</div>
      <div class="result-steps">
        <div class="result-step"><span class="step-num">1.</span><span class="step-text">Go back to the LinkedIn post</span></div>
        <div class="result-step"><span class="step-num">2.</span><span class="step-text">Drop your score in the comments 👇</span></div>
        <div class="result-smile"><span class="step-num">→</span><span class="step-text">Did you smile? Like the post ↗</span></div>
      </div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="restart()">Try again</button>
        <button class="btn-accent" id="copy-btn" onclick="copyScore('${titleEsc}', ${score})">Copy score</button>
      </div>
    </div>`;
}

function copyScore(title, pts) {
  navigator.clipboard.writeText(`I got "${title}" — ${pts}/30 on the HR AI Maturity Test 🤖`).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy score', 2000);
  });
}

function restart() { current = 0; score = 0; answered = new Array(10).fill(null); render(); }
render();
</script>
</body>
</html>
